name: Auto IP Collector

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时运行一次

# 🔑 关键更新：显式授予写入权限，防止 git push 时报 403 错误
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4  # ⬆️ 升级到最新的 v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5  # ⬆️ 升级到最新的 v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies & Set Env
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
          # 🕒 优化时区写法：使用 Asia/Shanghai 最为稳妥
          sT=$(TZ=Asia/Shanghai date +'%S')
          echo "update_version=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M'):${sT}" >> $GITHUB_ENV

      - name: 🧠 Run IP collector script
        run: |
          python collects.py

      - name: 📤 Commit and push IP results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add ipv4.txt ipv6.txt
          
          # 如果有改动则提交，无改动则静默跳过，不会导致 Action 报错红叉
          git diff --cached --quiet || git commit -m "Auto Update IP: ${update_version}"
          git push
